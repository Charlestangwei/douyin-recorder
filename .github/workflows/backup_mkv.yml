name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date filter (YYYYMMDD, e.g. 20260529)'
        required: true
env:
  PYTHON_VERSION: '3.11'
jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run backup script
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload MKV to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mkv-backup-${{ github.event.inputs.date }}
          path: /tmp/mkv_input/*.mkv
          retention-days: 90
      - name: Update manifest.json
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
