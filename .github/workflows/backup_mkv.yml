name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: Date filter (YYYYMMDD, e.g. 20260615)
        required: true
env:
  PYTHON_VERSION: "3.11"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    outputs:
      rooms: ${{ steps.set-rooms.outputs.rooms }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list                     /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq ffmpeg || true
          ffmpeg -version | head -1
      - name: Download and merge
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload merged files
        uses: actions/upload-artifact@v4
        with:
          name: merged-mkvs
          path: |
            /tmp/mkv_work/*/*.mkv
            /tmp/mkv_work/manifest.json
          retention-days: 1
      - name: Set rooms output
        id: set-rooms
        run: python set_rooms_output.py

  upload:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
    strategy:
      matrix:
        room: ${{ fromJSON(needs.prepare.outputs.rooms) }}
    steps:
      - name: Download merged MKVs
        uses: actions/download-artifact@v4
        with:
          name: merged-mkvs
      - name: Upload room artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkv-room-${{ matrix.room.key }}
          path: ${{ matrix.room.key }}/${{ matrix.room.file }}
          retention-days: 90

  finish:
    needs: upload
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: merged-mkvs
      - name: Push manifest to repo
        run: |
          python3 -c "
import json, base64, urllib.request, os, sys
t = os.environ['GH_TOKEN']
r = os.environ['GH_REPO']
api = 'https://api.github.com/repos/' + r
h = {'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json'}

with open('manifest.json') as f:
    new = json.load(f)

req = urllib.request.Request(api + '/contents/docs/manifest.json', headers=h)
resp = json.loads(urllib.request.urlopen(req, timeout=15).read())
old = json.loads(base64.b64decode(resp['content']).decode())
sha = resp['sha']
for k, v in new.items():
    old[k] = v
merged = json.dumps(old, indent=2, ensure_ascii=False)
body = json.dumps({'message': 'update manifest', 'content': base64.b64encode(merged.encode()).decode(), 'sha': sha, 'branch': 'main'}).encode()
urllib.request.urlopen(urllib.request.Request(api + '/contents/docs/manifest.json', data=body, headers=h, method='PUT'), timeout=15)
print('Manifest pushed with', len(new), 'new entries')
"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Match artifact IDs
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Cleanup releases
        run: python cleanup_release.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
