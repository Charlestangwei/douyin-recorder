name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date filter (YYYYMMDD, e.g. 20260615)'
        required: true
env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    outputs:
      rooms: ${{ steps.set-rooms.outputs.rooms }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq ffmpeg || true
          ffmpeg -version | head -1
      - name: Download and merge
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload merged files for next job
        uses: actions/upload-artifact@v4
        with:
          name: merged-mkvs
          path: |
            /tmp/mkv_work/*/*.mkv
          /tmp/mkv_work/manifest.json
            retention-days: 1
      - name: Set rooms output
        id: set-rooms
        run: python set_rooms_output.py

  upload:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
    strategy:
      matrix:
        room: ${{ fromJSON(needs.prepare.outputs.rooms) }}
    steps:
      - name: Download merged MKVs
        uses: actions/download-artifact@v4
        with:
          name: merged-mkvs
      - name: Upload room artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkv-room-${{ matrix.room.key }}
          path: ${{ matrix.room.key }}/${{ matrix.room.file }}
          retention-days: 90

  finish:
    needs: upload
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download manifest from prepare job
        uses: actions/download-artifact@v4
        with:
          name: merged-mkvs
      - name: Push manifest to GitHub
        run: |
          if [ -f manifest.json ]; then
            python3 -c "
import json, base64, urllib.request, os
GH_TOKEN = os.environ['GH_TOKEN']
GH_REPO = os.environ['GH_REPO']
API = 'https://api.github.com/repos/' + GH_REPO
HEADERS = {'Authorization': 'Bearer ' + GH_TOKEN, 'Content-Type': 'application/json'}

# Load new manifest
with open('manifest.json') as f:
    new_entries = json.load(f)

# Load existing manifest from GitHub
import urllib.request
req = urllib.request.Request(API + '/contents/docs/manifest.json', headers={'Authorization': 'Bearer ' + GH_TOKEN})
resp = json.loads(urllib.request.urlopen(req, timeout=15).read())
existing = json.loads(base64.b64decode(resp['content']).decode('utf-8'))
existing_sha = resp['sha']

# Merge
for k, v in new_entries.items():
    existing[k] = v

merged = json.dumps(existing, indent=2, ensure_ascii=False)
body = json.dumps({'message': 'update manifest: ' + str(list(new_entries.keys())), 'content': base64.b64encode(merged.encode()).decode(), 'sha': existing_sha, 'branch': 'main'}).encode()
req = urllib.request.Request(API + '/contents/docs/manifest.json', data=body, headers=HEADERS, method='PUT')
urllib.request.urlopen(req, timeout=15)
print('Manifest updated with ' + str(len(new_entries)) + ' new entries')
"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Update artifact IDs
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Cleanup Release assets
        run: python cleanup_release.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
