name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: Date filter (YYYYMMDD, e.g. 20260615)
        required: true
env:
  PYTHON_VERSION: "3.11"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq ffmpeg || true
          ffmpeg -version | head -1
      - name: Download and merge
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload per-room artifacts
        shell: bash
        run: |
          python3 -u -c "
import os, json, sys
mp = '/tmp/mkv_work/manifest.json'
if not os.path.exists(mp):
    sys.exit(0)
with open(mp) as f:
    m = json.load(f)
up = 0
for k, info in m.items():
    mf = info.get('merged_file', k + '_merged.mkv')
    fp = os.path.join('/tmp/mkv_work', k, mf)
    if not os.path.exists(fp):
        fp = os.path.join('/tmp/mkv_work', mf)
    if not os.path.exists(fp):
        continue
    print('Uploading ' + k + '...')
    r = os.system('python3 upload_artifact.py mkv-room-' + k + ' \"' + fp + '\"')
    if r == 0:
        up += 1
        print('  OK: ' + k)
    else:
        print('  FAIL: ' + k)
print('Uploaded ' + str(up) + '/' + str(len(m)) + ' rooms')
"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: mkv-manifest
          path: /tmp/mkv_work/manifest.json
          retention-days: 1
      - name: Update manifest
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Cleanup Release assets
        run: python cleanup_release.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
