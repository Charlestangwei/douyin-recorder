name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date filter (YYYYMMDD, e.g. 20260615)'
        required: true
env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    outputs:
      rooms: ${{ steps.set-rooms.outputs.rooms }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq ffmpeg || true
          ffmpeg -version | head -1
      - name: Download and merge
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload merged files for next job
        uses: actions/upload-artifact@v4
        with:
          name: merged-mkvs
          path: /tmp/mkv_work/*/*.mkv
          retention-days: 1
      - name: Set rooms output
        id: set-rooms
        run: python set_rooms_output.py

  upload:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
    strategy:
      matrix:
        room: ${{ fromJSON(needs.prepare.outputs.rooms) }}
      max-parallel: 2
    steps:
      - name: Download merged MKVs
        uses: actions/download-artifact@v4
        with:
          name: merged-mkvs
      - name: Upload room artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkv-room-${{ matrix.room.key }}
          path: ${{ matrix.room.key }}/${{ matrix.room.file }}
          retention-days: 90

  finish:
    needs: upload
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cleanup Release assets
        run: python cleanup_release.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Update manifest
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
