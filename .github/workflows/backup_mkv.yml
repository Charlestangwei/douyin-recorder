name: Backup MKV to Artifact
on:
  workflow_dispatch:
    inputs:
      date:
        description: Date filter (YYYYMMDD, e.g. 20260615)
        required: true
env:
  PYTHON_VERSION: "3.11"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ffmpeg
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq ffmpeg || true
          ffmpeg -version | head -1
      - name: Download and merge
        run: python backup_mkv.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Upload per-room artifacts
        run: |
          python3 -c "
import os, json
manifest_path = '/tmp/mkv_work/manifest.json'
if not os.path.exists(manifest_path):
    print('No manifest found')
    exit(0)
with open(manifest_path) as f:
    m = json.load(f)
uploaded = 0
for key, info in m.items():
    mfile = info.get('merged_file', key + '_merged.mkv')
    fpath = os.path.join('/tmp/mkv_work', key, mfile)
    if not os.path.exists(fpath):
        # try without subdirectory
        fpath = os.path.join('/tmp/mkv_work', mfile)
    if not os.path.exists(fpath):
        print(f'SKIP {key}: file not found')
        continue
    ret = os.system(f'python3 upload_artifact.py mkv-room-{key} {fpath}')
    if ret == 0:
        uploaded += 1
        print(f'  Uploaded {key}')
print(f'Uploaded {uploaded}/{len(m)} rooms')
"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: mkv-manifest
          path: /tmp/mkv_work/manifest.json
          retention-days: 1
      - name: Update manifest
        run: python update_manifest.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Cleanup Release assets
        run: python cleanup_release.py ${{ github.event.inputs.date }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
