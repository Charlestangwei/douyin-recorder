name: Baidu Upload Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bypy
      - name: Token
        env:
          BYPY_TOKEN: ${{ secrets.BYPY_TOKEN }}
        run: |
          mkdir -p ~/.bypy
          python3 -c "import json,os,base64;json.dump(json.loads(base64.b64decode(os.environ['BYPY_TOKEN']).decode()),open(os.path.expanduser('~/.bypy/bypy.json'),'w'));print('OK')"
      - name: Upload
        run: |
          curl -sL -o /tmp/test.mkv "https://github.com/Charlestangwei/douyin-recorder/releases/download/961019695933_20260530_073145_000.mkv/961019695933_20260530_073145_000.mkv"
          SECONDS=0
          bypy --select-fastest-mirror -s 100 -t 600 -r 15 upload /tmp/test.mkv "/麻花在泰国/05300731-0832/"
          echo "Took ${SECONDS}s"
