name: Baidu Upload Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bypy
        run: pip install bypy

      - name: Restore token
        env:
          BYPY_TOKEN: ${{ secrets.BYPY_TOKEN }}
        run: |
          mkdir -p ~/.bypy
          python3 << 'PYEOF'
import json, os, base64
b64 = os.environ['BYPY_TOKEN']
tok = json.loads(base64.b64decode(b64).decode())
with open(os.path.expanduser('~/.bypy/bypy.json'), 'w') as f:
    json.dump(tok, f)
print('Token OK:', list(tok.keys()))
PYEOF

      - name: Upload MKV
        run: |
          URL="https://github.com/Charlestangwei/douyin-recorder/releases/download/961019695933_20260530_073145_000.mkv/961019695933_20260530_073145_000.mkv"
          echo "Downloading..."
          curl -sL -o /tmp/test.mkv "${URL}"
          ls -lh /tmp/test.mkv
          echo "Uploading..."
          SECONDS=0
          bypy upload /tmp/test.mkv "/麻花在泰国/05300731-0832/" 2>&1
          echo "Took ${SECONDS}s"

      - name: Verify
        run: |
          echo "=== Files ==="
          bypy list "/麻花在泰国/05300731-0832/" 2>&1
