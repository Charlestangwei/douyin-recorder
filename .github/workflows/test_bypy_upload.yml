name: Test Baidu Upload v4

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bypy
        run: pip install bypy

      - name: Restore Baidu token
        run: |+
          mkdir -p ~/.bypy
          echo "${{ secrets.BYPY_TOKEN }}" | base64 -d > /tmp/token.json
          python3 << 'PYEOF'
import json, os
with open('/tmp/token.json') as f:
    token = json.load(f)
with open(os.path.expanduser('~/.bypy/bypy.json'), 'w') as f:
    json.dump(token, f)
print('Token restored:', list(token.keys()))
PYEOF

      - name: Upload MKV with slice=200
        run: |+
          ROOM_NAME="麻花在泰国"
          START_TIME="20260530_073145"
          END_TIME="20260530_083205"
          FOLDER="/${ROOM_NAME}/${START_TIME:4:4}${START_TIME:9:2}${START_TIME:11:2}-${END_TIME:9:2}${END_TIME:11:2}/"
          echo "Folder: ${FOLDER}"
          BASE_URL="https://github.com/Charlestangwei/douyin-recorder/releases/download"
          FNAME="961019695933_20260530_073145_000.mkv"
          echo "Downloading ${FNAME}..."
          curl -sL -o /tmp/"${FNAME}" "${BASE_URL}/${FNAME}/${FNAME}"
          echo "Uploading with --slice 200..."
          SECONDS=0
          bypy upload --slice 200 /tmp/"${FNAME}" "${FOLDER}" 2>&1 || true
          echo "Upload took ${SECONDS}s"

      - name: Verify
        run: |+
          echo "=== Folder ==="
          bypy list "/麻花在泰国/" 2>&1
          echo ""
          echo "=== File ==="
          bypy list "/麻花在泰国/05300731-0832/" 2>&1
