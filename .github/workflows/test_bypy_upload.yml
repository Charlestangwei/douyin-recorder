name: Test Baidu Upload v8

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bypy
        run: pip install bypy && python3 -c "import bypy; print('bypy', bypy.__version__)"

      - name: Restore token + upload
        env:
          BYPY_TOKEN: ${{ secrets.BYPY_TOKEN }}
        run: |
          python3 << 'PYEOF'
import json, os, base64, subprocess, time, sys

# Restore token
b64 = os.environ.get("BYPY_TOKEN")
if b64:
    tok = json.loads(base64.b64decode(b64).decode())
    with open(os.path.expanduser("~/.bypy/bypy.json"), "w") as f:
        json.dump(tok, f)
    print("Token restored:", list(tok.keys()))

# Download
url = "https://github.com/Charlestangwei/douyin-recorder/releases/download/961019695933_20260530_073145_000.mkv/961019695933_20260530_073145_000.mkv"
sys.stdout.flush()
r = os.system('curl -sL -o /tmp/test.mkv "' + url + '" 2>&1')
size = os.path.getsize("/tmp/test.mkv")
print(f"Downloaded: {size/1024/1024:.0f}MB")

# Upload via Python API
from bypy import ByPy
by = ByPy(slice_size=209715200)  # 200MB
start = time.time()
result = by.upload("/tmp/test.mkv", "/麻花在泰国/05300731-0832/")
elapsed = time.time() - start
print(f"Upload result: {result}, took {elapsed:.0f}s")
if result == 0:
    print(f"Speed: {size/1024/1024/elapsed:.2f}MB/s")
else:
    print("Upload FAILED - will try subprocess fallback")
    r2 = os.system('bypy upload /tmp/test.mkv "/麻花在泰国/05300731-0832/" 2>&1')
    print(f"Fallback result: {r2}")
PYEOF

      - name: Verify
        run: |
          bypy list "/麻花在泰国/05300731-0832/" 2>&1
