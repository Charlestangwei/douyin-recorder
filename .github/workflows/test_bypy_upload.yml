name: Test Baidu Upload v5

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bypy
        run: pip install bypy

      - name: Restore Baidu token
        run: |
          mkdir -p ~/.bypy
          echo "${{ secrets.BYPY_TOKEN }}" | base64 -d > /tmp/token.json
          python3 -c "import json,os; json.dump(json.load(open('/tmp/token.json')), open(os.path.expanduser('~/.bypy/bypy.json'),'w')); print('OK')"

      - name: Upload MKV with -s 200
        run: |
          ROOM_NAME="麻花在泰国"
          START_TIME="20260530_073145"
          END_TIME="20260530_083205"
          FOLDER="/${ROOM_NAME}/${START_TIME:4:4}${START_TIME:10:2}${START_TIME:12:2}-${END_TIME:10:2}${END_TIME:12:2}/"
          echo "Folder: ${FOLDER}"
          FNAME="961019695933_20260530_073145_000.mkv"
          curl -sL -o /tmp/"${FNAME}" "https://github.com/Charlestangwei/douyin-recorder/releases/download/${FNAME}/${FNAME}"
          echo "Uploading..."
          SECONDS=0
          bypy upload -s 200 /tmp/"${FNAME}" "${FOLDER}" 2>&1 || true
          echo "Upload took ${SECONDS}s"

      - name: Verify
        run: |
          bypy list "/麻花在泰国/05300731-0832/" 2>&1
