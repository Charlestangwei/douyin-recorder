name: 24h searcher

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run_searcher]

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Show TH time
        run: |
          echo 'GitHub UTC: ' $(date -u '+%Y-%m-%d %H:%M:%S')
          echo 'Thailand:  ' $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')

      - name: Run searcher (5h loop)
        run: python searcher_cloud.py
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_RUN_NUMBER: ${{ github.run_number }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}

      - name: Self-renew (trigger next run, dedup)
        if: always()
        run: |
          EXISTING=$(curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/searcher.yml/runs?per_page=5&status=in_progress")
          IN_PROGRESS=$(echo "$EXISTING" | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); current='${{ github.run_number }}'; other=[r['run_number'] for r in runs if str(r['run_number'])!=current]; print(len(other))" 2>/dev/null || echo "0")
          if [ "$IN_PROGRESS" -gt "0" ]; then
            echo "Skipped: $IN_PROGRESS other in-progress run(s) exist"
          else
            curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/actions/workflows/searcher.yml/dispatches" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "User-Agent: renew" \
              --data '{"ref":"main"}' && echo "Renew OK" || echo "Renew FAIL"
          fi
