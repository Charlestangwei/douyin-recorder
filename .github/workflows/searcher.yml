name: searcher

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run_searcher]

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Show TH time
        run: |
          echo 'GitHub UTC: ' $(date -u '+%Y-%m-%d %H:%M:%S')
          echo 'Thailand:  ' $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')

      - name: Run searcher (2h loop, auto-renew at end)
        run: python searcher_cloud.py
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_RUN_NUMBER: ${{ github.run_number }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
